trigger: none

pool:
  name: MYAGENT

stages:

#==========================
# Stage 1 - Terraform Init
#==========================
- stage: Init
  displayName: Terraform Init

  jobs:
  - job: InitJob
    steps:

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: 'newserviceconnection'
        backendAzureRmResourceGroupName: 'PANKAJ-RG'
        backendAzureRmStorageAccountName: 'stgh123'
        backendAzureRmContainerName: 'newcontainer'
        backendAzureRmKey: 'KEY12'

#==========================
# Stage 2 - Terraform Plan
#==========================
- stage: Plan
  displayName: Terraform Plan
  dependsOn: Init

  jobs:
  - job: PlanJob
    steps:

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: 'newserviceconnection'
        backendAzureRmResourceGroupName: 'PANKAJ-RG'
        backendAzureRmStorageAccountName: 'stgh123'
        backendAzureRmContainerName: 'newcontainer'
        backendAzureRmKey: 'KEY12'

    - task: TerraformTask@5
      displayName: Terraform Plan
      inputs:
        provider: 'azurerm'
        command: 'plan'
        environmentServiceNameAzureRM: 'newserviceconnection'

#==========================
# Stage 3 - Terraform Apply
#==========================
- stage: Apply
  displayName: Terraform Apply
  dependsOn: Plan

  jobs:
  - job: ApplyJob
    steps:

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: 'newserviceconnection'
        backendAzureRmResourceGroupName: 'PANKAJ-RG'
        backendAzureRmStorageAccountName: 'stgh123'
        backendAzureRmContainerName: 'newcontainer'
        backendAzureRmKey: 'KEY12'

    - task: TerraformTask@5
      displayName: Terraform Apply
      inputs:
        provider: 'azurerm'
        command: 'apply'
        environmentServiceNameAzureRM: 'newserviceconnection'